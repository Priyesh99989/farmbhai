<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmDirect - Track Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7f0 0%, #e8f0e5 100%); color: #1e3a1e; }
        .header { background: linear-gradient(135deg, #1e3a1e, #2d5a2c); color: white; text-align: center; padding: 32px 20px; border-radius: 0 0 40px 40px; }
        .header h1 { font-size: 2rem; font-weight: 700; }
        .badge { background: rgba(255,255,255,0.2); display: inline-block; padding: 8px 20px; border-radius: 40px; margin-top: 16px; }
        .nav-menu { margin-top: 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .nav-menu a { background: rgba(255,255,255,0.1); color: white; padding: 8px 18px; border-radius: 40px; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .track-container { max-width: 900px; margin: 30px auto; background: white; border-radius: 32px; padding: 28px; box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1); }
        .track-map { height: 400px; border-radius: 20px; margin: 20px 0; width: 100%; }
        input, button { width: 100%; padding: 14px; border-radius: 40px; margin: 10px 0; }
        input { border: 1px solid #ccc; font-size: 1rem; }
        button { background: #4caf50; color: white; border: none; cursor: pointer; font-weight: 600; }
        button:hover { background: #2e7d32; }
        .order-found { background: #c8e6c9; padding: 20px; border-radius: 20px; margin-top: 20px; }
        .order-not-found { background: #ffcdd2; padding: 20px; border-radius: 20px; margin-top: 20px; }
        .status-steps { display: flex; justify-content: space-between; margin: 20px 0; flex-wrap: wrap; gap: 10px; }
        .status-step { text-align: center; flex: 1; min-width: 80px; }
        .status-dot { width: 30px; height: 30px; border-radius: 50%; margin: 0 auto 8px; }
        .status-dot.completed { background: #4caf50; }
        .status-dot.active { background: #ff9800; animation: pulse 1s infinite; }
        .status-dot.pending { background: #ccc; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .footer { text-align: center; padding: 32px 20px; color: #5a6e5a; font-size: 0.85rem; margin-top: 40px; }
        .est-time { background: #fff3e0; padding: 10px; border-radius: 40px; text-align: center; margin: 15px 0; }
        .loading-spinner { text-align: center; padding: 40px; }
        .loading-spinner::after { content: "⏳"; font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <h1>📍 Track Your Order</h1>
    <p>See where your rice is — from farm to your doorstep</p>
    <div class="badge">🤝 Farmer First | Zero Middlemen | Zero Profit on Rice</div>
    <div class="nav-menu">
        <a href="index.html">🏠 Home</a>
        <a href="dashboard.html">📋 Dashboard</a>
        <a href="track.html">📍 Track Order</a>
    </div>
</div>

<div class="track-container">
    <h2>🔍 Track Your Order</h2>
    <input type="text" id="orderId" placeholder="Enter Order ID" autocomplete="off">
    <button onclick="trackOrder()">Track Order</button>
    <div id="trackResult"></div>
</div>

<div class="footer">
    <p>🌾 FarmDirect — Farmer First, Zero Profit on Rice</p>
</div>

<script>
    // Coordinates for route
    const locations = {
        farm: { lat: 17.5, lng: 78.5, name: "🌾 Farm (Telangana)" },
        bus: { lat: 17.8, lng: 78.8, name: "🚌 On Bus" },
        city: { lat: 18.0, lng: 79.0, name: "📍 Hyderabad Arrival" },
        delivery: { lat: 17.45, lng: 78.39, name: "🚚 Local Delivery" }
    };
    
    let currentMap = null;
    let currentMarker = null;
    
    function initMap(elementId, lat, lng, status) {
        if (currentMap) {
            currentMap.remove();
            currentMap = null;
        }
        
        setTimeout(function() {
            const mapElement = document.getElementById(elementId);
            if (!mapElement) return;
            
            currentMap = L.map(elementId).setView([lat, lng], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(currentMap);
            
            let markerColor = '#4caf50';
            if (status === 'on_bus') markerColor = '#ff9800';
            else if (status === 'in_city') markerColor = '#2196f3';
            else if (status === 'delivered') markerColor = '#2e7d32';
            else if (status === 'cancelled') markerColor = '#9e9e9e';
            
            currentMarker = L.marker([lat, lng], {
                icon: L.divIcon({ 
                    html: `<div style="background: ${markerColor}; width: 25px; height: 25px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>`, 
                    iconSize: [25, 25], 
                    className: 'custom-marker' 
                })
            }).addTo(currentMap).bindPopup(getStatusMessage(status)).openPopup();
        }, 50);
    }
    
    function getStatusMessage(status) {
        const messages = {
            'placed': '📋 Order confirmed. Farmer is preparing your rice.',
            'confirmed': '✅ Order confirmed and processed.',
            'on_bus': '🚌 Rice is on the bus from farm to Hyderabad.',
            'in_city': '📍 Rice has arrived in Hyderabad. Local delivery starting soon.',
            'delivered': '🎉 Delivered! Enjoy your fresh rice.',
            'cancelled': '❌ Order cancelled.'
        };
        return messages[status] || 'Processing your order';
    }
    
    function getEstimatedTime(status) {
        const times = {
            'placed': 'Estimated delivery: 2-3 days',
            'confirmed': 'Estimated delivery: 2-3 days',
            'on_bus': 'Estimated delivery: 1-2 days',
            'in_city': 'Estimated delivery: Today or tomorrow',
            'delivered': 'Delivered! Thank you for shopping with us.'
        };
        return times[status] || 'Check back for updates';
    }
    
    function getCoordinatesByStatus(status) {
        switch(status) {
            case 'placed':
            case 'confirmed':
                return { lat: locations.farm.lat, lng: locations.farm.lng };
            case 'on_bus':
                return { lat: locations.bus.lat, lng: locations.bus.lng };
            case 'in_city':
                return { lat: locations.city.lat, lng: locations.city.lng };
            case 'delivered':
            case 'cancelled':
                return { lat: locations.delivery.lat, lng: locations.delivery.lng };
            default:
                return { lat: locations.farm.lat, lng: locations.farm.lng };
        }
    }
    
    async function fetchOrderFromSheets(orderId) {
        try {
            if (window.SCRIPT_URL) {
                const response = await fetch(`${SCRIPT_URL}?action=getOrder&orderId=${orderId}`);
                const data = await response.json();
                if (data.success && data.order) {
                    return data.order;
                }
            }
        } catch(e) {
            console.log('Could not fetch from sheets:', e);
        }
        return null;
    }
    
    async function trackOrder() {
        const orderId = document.getElementById('orderId').value.trim();
        const resultDiv = document.getElementById('trackResult');
        
        if (!orderId) {
            resultDiv.innerHTML = '<div class="order-not-found">❌ Please enter an Order ID</div>';
            return;
        }
        
        resultDiv.innerHTML = '<div class="loading-spinner"></div><div style="text-align:center;">⏳ Searching for your order...</div>';
        
        try {
            // First check localStorage
            let orders = JSON.parse(localStorage.getItem('farmdirect_orders')) || [];
            let order = orders.find(o => o.orderId == orderId);
            
            // If not found, try Google Sheets
            if (!order) {
                order = await fetchOrderFromSheets(orderId);
                if (order && !orders.find(o => o.orderId == orderId)) {
                    orders.push(order);
                    localStorage.setItem('farmdirect_orders', JSON.stringify(orders));
                }
            }
            
            if (!order) {
                resultDiv.innerHTML = '<div class="order-not-found">❌ Order not found. Please check your Order ID.</div>';
                return;
            }
            
            const status = order.status || 'placed';
            const coords = getCoordinatesByStatus(status);
            
            const steps = [
                { key: 'placed', name: 'Order Placed', icon: '📋' },
                { key: 'on_bus', name: 'On Bus', icon: '🚌' },
                { key: 'in_city', name: 'In City', icon: '📍' },
                { key: 'delivered', name: 'Delivered', icon: '🎉' }
            ];
            
            let currentIndex = steps.findIndex(s => s.key === status);
            if (status === 'confirmed') currentIndex = 0;
            if (status === 'cancelled') currentIndex = -1;
            
            let stepsHtml = '<div class="status-steps">';
            steps.forEach((step, idx) => {
                let statusClass = 'pending';
                if (currentIndex >= 0 && idx < currentIndex) statusClass = 'completed';
                else if (currentIndex >= 0 && idx === currentIndex) statusClass = 'active';
                if (status === 'cancelled') statusClass = 'pending';
                
                stepsHtml += `
                    <div class="status-step">
                        <div class="status-dot ${statusClass}"></div>
                        <div>${step.icon} ${step.name}</div>
                    </div>
                `;
            });
            stepsHtml += '</div>';
            
            if (status === 'cancelled') {
                stepsHtml = '<div style="text-align:center; padding:20px; background:#ffcdd2; border-radius:20px; margin:20px 0;">❌ This order has been cancelled</div>';
            }
            
            const estTime = getEstimatedTime(status);
            const statusNames = { 
                'placed': '📦 Placed', 
                'confirmed': '✅ Confirmed', 
                'on_bus': '🚌 On Bus', 
                'in_city': '📍 In City', 
                'delivered': '🎉 Delivered', 
                'cancelled': '❌ Cancelled' 
            };
            
            const mapId = 'trackMap_' + Date.now();
            
            resultDiv.innerHTML = `
                <div id="${mapId}" class="track-map"></div>
                ${stepsHtml}
                <div class="est-time">⏰ <strong>${estTime}</strong></div>
                <div class="order-found">
                    <h3>📋 Order Details</h3>
                    <p><strong>Order ID:</strong> ${order.orderId}</p>
                    <p><strong>Product:</strong> ${order.product || 'N/A'}</p>
                    <p><strong>Quantity:</strong> ${order.quantity || 0} kg</p>
                    <p><strong>Total:</strong> ₹${order.total || 0}</p>
                    <p><strong>Status:</strong> ${statusNames[status] || status}</p>
                    <p><strong>Delivery Address:</strong> ${order.address || 'Address not provided'}</p>
                    ${order.delivery_date ? `<p><strong>Delivery Date:</strong> ${order.delivery_date}</p>` : ''}
                </div>
            `;
            
            initMap(mapId, coords.lat, coords.lng, status);
            
        } catch(err) {
            console.error('Track error:', err);
            resultDiv.innerHTML = '<div class="order-not-found">❌ Error loading order. Please try again.</div>';
        }
    }
    
    // Allow Enter key to trigger search
    document.getElementById('orderId').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            trackOrder();
        }
    });
</script>
</body>
</html>
