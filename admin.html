<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmDirect - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7f0 0%, #e8f0e5 100%); color: #1e3a1e; }
        .header { background: linear-gradient(135deg, #1e3a1e, #2d5a2c); color: white; text-align: center; padding: 32px 20px; border-radius: 0 0 40px 40px; }
        .header h1 { font-size: 2rem; font-weight: 700; }
        .badge { background: rgba(255,255,255,0.2); display: inline-block; padding: 8px 20px; border-radius: 40px; margin-top: 16px; }
        .nav-menu { margin-top: 24px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .nav-menu a { background: rgba(255,255,255,0.1); color: white; padding: 8px 20px; border-radius: 40px; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .container { max-width: 1200px; margin: 30px auto; background: white; border-radius: 32px; padding: 28px; box-shadow: 0 10px 30px -15px rgba(0,0,0,0.1); }
        .chat-card { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 16px; border-left: 5px solid #2196f3; }
        .chat-message { background: #e8f5e9; padding: 10px 15px; border-radius: 20px; margin: 8px 0; }
        .admin-reply { background: #e3f2fd; }
        .reply-section { display: flex; gap: 8px; margin-top: 10px; }
        .reply-section input { flex: 1; padding: 8px 12px; border-radius: 40px; border: 1px solid #ccc; }
        .reply-section button { padding: 8px 16px; border-radius: 40px; background: #2196f3; color: white; border: none; cursor: pointer; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; padding: 10px 20px; border-radius: 40px; cursor: pointer; border: none; }
        .tab-btn.active { background: #4caf50; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .login-section { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 32px; text-align: center; }
        .admin-login-input { padding: 12px; width: 100%; margin: 10px 0; border-radius: 40px; border: 1px solid #ccc; }
        .refresh-btn { background: #4caf50; color: white; border: none; padding: 8px 16px; border-radius: 40px; margin-bottom: 15px; cursor: pointer; }
        .dashboard-card {
            background: linear-gradient(135deg, #1e3a1e, #2d5a2c);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        .dashboard-card h3 { font-size: 0.9rem; opacity: 0.9; }
        .dashboard-card h2 { font-size: 2rem; margin-top: 5px; }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .export-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="adminLogin" class="login-section">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPassword" class="admin-login-input" placeholder="Enter Admin Password">
    <button onclick="adminLogin()">Login</button>
    <div id="loginError" style="color:red; margin-top:10px;"></div>
</div>

<div id="adminPanel" style="display:none;">
    <div class="header">
        <h1>👨‍💼 Admin Dashboard</h1>
        <p>Manage Orders & Reply to Customers</p>
        <div class="badge">🤝 Farmer First | Zero Middlemen | Zero Profit</div>
        <div class="nav-menu">
            <a href="index.html">🏠 Home</a>
            <a href="dashboard.html">📋 Dashboard</a>
            <a href="track.html">📍 Track Order</a>
        </div>
    </div>
    <div class="container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('chats')">💬 Customer Chats</button>
            <button class="tab-btn" onclick="showTab('orders')">📋 Orders</button>
            <button class="tab-btn" onclick="showTab('dashboard')">📊 Dashboard</button>
        </div>
        
        <div id="chatsTab" class="tab-content active">
            <button class="refresh-btn" onclick="loadAllChats()">🔄 Refresh Chats</button>
            <div id="chatsList"></div>
        </div>
        
        <div id="ordersTab" class="tab-content">
            <button class="refresh-btn" onclick="loadAllOrders()">🔄 Refresh Orders</button>
            <div id="ordersList"></div>
        </div>
        
        <div id="dashboardTab" class="tab-content">
            <div class="stats-grid">
                <div class="dashboard-card">
                    <h3>📦 Total Orders</h3>
                    <h2 id="totalOrdersCount">0</h2>
                </div>
                <div class="dashboard-card" style="background: linear-gradient(135deg, #2196f3, #1976d2);">
                    <h3>💰 Total Revenue</h3>
                    <h2 id="totalRevenue">₹0</h2>
                </div>
                <div class="dashboard-card" style="background: linear-gradient(135deg, #ff9800, #f57c00);">
                    <h3>👨‍🌾 Farmers Share</h3>
                    <h2 id="totalFarmersShare">₹0</h2>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>📊 Orders by Status</h3>
                    <canvas id="statusChart" style="max-height: 300px;"></canvas>
                </div>
                <div class="chart-container">
                    <h3>🔥 Top Products</h3>
                    <canvas id="productsChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
            
            <button class="export-btn" onclick="exportSalesReport()">📥 Export Report (CSV)</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = 'admin123';
    let statusChart = null;
    let productsChart = null;
    
    function adminLogin() {
        const pwd = document.getElementById('adminPassword').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllOrders();
            loadAllChats();
            loadDashboard();
        } else { 
            document.getElementById('loginError').innerHTML = 'Wrong password!';
        }
    }
    
    function showTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'chats') {
            document.querySelector('.tab-btn').classList.add('active');
            document.getElementById('chatsTab').classList.add('active');
            loadAllChats();
        } else if (tab === 'orders') {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('ordersTab').classList.add('active');
            loadAllOrders();
        } else if (tab === 'dashboard') {
            document.querySelectorAll('.tab-btn')[2].classList.add('active');
            document.getElementById('dashboardTab').classList.add('active');
            loadDashboard();
        }
    }
    
    function loadAllOrders() {
        const orders = JSON.parse(localStorage.getItem('farmdirect_orders')) || [];
        const container = document.getElementById('ordersList');
        if (orders.length === 0) { 
            container.innerHTML = '<p>No orders yet.</p>'; 
            return; 
        }
        let html = '';
        orders.forEach(order => {
            html += `<div class="chat-card" style="border-left-color:#4caf50;">
                <p><strong>Order ID:</strong> ${order.orderId}</p>
                <p><strong>Customer:</strong> ${order.name}</p>
                <p><strong>Phone:</strong> ${order.phone}</p>
                <p><strong>Product:</strong> ${order.product}</p>
                <p><strong>Quantity:</strong> ${order.quantity} kg</p>
                <p><strong>Total:</strong> ₹${order.total}</p>
                <p><strong>Address:</strong> ${order.address || 'Not provided'}</p>
                <p><strong>Status:</strong> ${order.status}</p>
                <p>
                    <select id="status-${order.orderId}">
                        <option value="placed" ${order.status === 'placed' ? 'selected' : ''}>Placed</option>
                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                        <option value="on_bus" ${order.status === 'on_bus' ? 'selected' : ''}>On Bus</option>
                        <option value="in_city" ${order.status === 'in_city' ? 'selected' : ''}>In City</option>
                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                    </select>
                    <button onclick="updateOrderStatus(${order.orderId})">Update</button>
                </p>
            </div>`;
        });
        container.innerHTML = html;
    }
    
    function updateOrderStatus(orderId) {
        const newStatus = document.getElementById(`status-${orderId}`).value;
        let orders = JSON.parse(localStorage.getItem('farmdirect_orders')) || [];
        const index = orders.findIndex(o => o.orderId == orderId);
        if (index !== -1) { 
            orders[index].status = newStatus; 
            localStorage.setItem('farmdirect_orders', JSON.stringify(orders)); 
            alert(`Order ${orderId} updated to ${newStatus}`);
            loadAllOrders();
            loadDashboard();
        }
    }
    
    async function loadAllChats() {
        const container = document.getElementById('chatsList');
        container.innerHTML = '<p>Loading...</p>';
        
        try {
            const response = await fetch(CHAT_SCRIPT_URL);
            const data = await response.json();
            
            if (data.success && data.chats) {
                displayChats(data.chats, container);
            } else {
                container.innerHTML = '<p>No messages yet.</p>';
            }
        } catch(err) { 
            console.error(err);
            container.innerHTML = '<p>Error loading chats.</p>';
        }
    }
    
    function displayChats(chats, container) {
        if (!chats || chats.length === 0) { 
            container.innerHTML = '<p>No messages yet.</p>'; 
            return; 
        }
        
        let html = '';
        const sortedChats = [...chats].reverse();
        
        sortedChats.forEach((chat, idx) => {
            const chatId = Date.now() + idx;
            html += `<div class="chat-card" id="chat-${chatId}">
                <p><strong>Customer:</strong> ${chat.name || 'Guest'} (${chat.phone || 'No phone'})</p>
                <p><strong>Time:</strong> ${chat.timestamp || ''}</p>
                <div class="chat-message"><strong>Message:</strong> ${chat.message || ''}</div>`;
            
            if (chat.reply && chat.reply !== '') {
                html += `<div class="chat-message admin-reply"><strong>Admin Reply:</strong> ${chat.reply}<br><small>${chat.replyTime || ''}</small></div>`;
            }
            
            html += `<div class="reply-section">
                <input type="text" id="reply-${chatId}" placeholder="Type reply...">
                <button onclick="sendReply('${chatId}', '${chat.phone}', '${chat.name}')">Send Reply</button>
            </div></div>`;
        });
        container.innerHTML = html;
    }
    
    async function sendReply(chatId, phone, name) {
        const input = document.getElementById(`reply-${chatId}`);
        const reply = input.value.trim();
        
        if (!reply) {
            alert('Type a reply first');
            return;
        }
        
        try {
            const response = await fetch(CHAT_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'sendReply',
                    phone: phone,
                    reply: reply
                })
            });
            
            alert('Reply sent!');
            input.value = '';
            setTimeout(() => loadAllChats(), 1000);
            
        } catch(err) {
            alert('Error: ' + err.message);
        }
    }
    
    // ========== DASHBOARD FUNCTIONS ==========
    function loadDashboard() {
        const orders = JSON.parse(localStorage.getItem('farmdirect_orders')) || [];
        
        const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        const totalFarmersShare = totalRevenue * 0.82;
        
        document.getElementById('totalOrdersCount').innerText = orders.length;
        document.getElementById('totalRevenue').innerText = `₹${totalRevenue}`;
        document.getElementById('totalFarmersShare').innerText = `₹${Math.round(totalFarmersShare)}`;
        
        const statusCounts = { placed: 0, confirmed: 0, on_bus: 0, in_city: 0, delivered: 0, cancelled: 0 };
        orders.forEach(o => {
            if (statusCounts[o.status] !== undefined) statusCounts[o.status]++;
            else statusCounts.placed++;
        });
        
        const productCounts = {};
        orders.forEach(o => {
            productCounts[o.product] = (productCounts[o.product] || 0) + 1;
        });
        
        if (statusChart) statusChart.destroy();
        if (productsChart) productsChart.destroy();
        
        const ctx1 = document.getElementById('statusChart').getContext('2d');
        statusChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['Placed', 'Confirmed', 'On Bus', 'In City', 'Delivered', 'Cancelled'],
                datasets: [{
                    label: 'Orders',
                    data: [statusCounts.placed, statusCounts.confirmed, statusCounts.on_bus, statusCounts.in_city, statusCounts.delivered, statusCounts.cancelled],
                    backgroundColor: ['#4caf50', '#2196f3', '#ff9800', '#9c27b0', '#2e7d32', '#f44336']
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        const ctx2 = document.getElementById('productsChart').getContext('2d');
        productsChart = new Chart(ctx2, {
            type: 'pie',
            data: {
                labels: Object.keys(productCounts),
                datasets: [{
                    data: Object.values(productCounts),
                    backgroundColor: ['#4caf50', '#ff9800', '#2196f3', '#9c27b0', '#f44336', '#2e7d32']
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }
    
    function exportSalesReport() {
        const orders = JSON.parse(localStorage.getItem('farmdirect_orders')) || [];
        let csv = "Order ID,Product,Quantity,Total,Status,Customer,Phone,Address,Date\n";
        orders.forEach(o => {
            csv += `"${o.orderId}","${o.product}",${o.quantity},${o.total},"${o.status}","${o.name}","${o.phone}","${o.address || ''}","${o.timestamp || ''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `farmdirect_sales_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ Report downloaded!');
    }
</script>
</body>
</html>
